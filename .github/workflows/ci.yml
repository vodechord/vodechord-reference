name: CI

on:
  push:
    branches: [main, '**']
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Install Node lint tools
        run: |
          npm install --no-save eslint@^9 stylelint@^16 stylelint-config-standard

      - name: Run ruff (Python)
        run: |
          if [ -d scripts ]; then
            ruff check scripts || true
          fi

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          ignore_paths: node_modules build

      - name: Run eslint (JS)
        run: |
          if [ -d src/js ] || [ -d src/exhibits ]; then
            npx eslint 'src/**/*.js' || true
          fi

      - name: Run stylelint (CSS)
        run: |
          if [ -d src/css ]; then
            npx stylelint 'src/**/*.css' --config-basedir node_modules/stylelint-config-standard || true
          fi

  audio-reproducibility:
    name: Audio reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audio dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      - name: Regenerate a subset of audio and check reproducibility
        run: |
          if [ -f scripts/verify_reproducibility.py ]; then
            python scripts/verify_reproducibility.py
          else
            echo "No reproducibility verifier yet; skipping."
          fi

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/mlc_config.json'
          folder-path: 'docs,.'
          file-extension: '.md'

  build:
    name: Build site
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site
        run: |
          if [ -f scripts/build.sh ]; then
            bash scripts/build.sh
          else
            echo "No build script yet; skipping."
            mkdir -p build
            if [ -d src ]; then
              cp -r src/* build/ 2>/dev/null || true
            fi
            if [ -d audio ]; then
              cp -r audio build/ 2>/dev/null || true
            fi
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: build/
          retention-days: 7

  deploy:
    name: Deploy to BlueHost
    runs-on: ubuntu-latest
    needs: [build, audio-reproducibility, link-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: build/

      - name: Deploy via rsync over SSH
        if: env.BLUEHOST_HOST != ''
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USER: ${{ secrets.BLUEHOST_USER }}
          BLUEHOST_PATH: ${{ secrets.BLUEHOST_PATH }}
          BLUEHOST_SSH_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$BLUEHOST_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$BLUEHOST_HOST" >> ~/.ssh/known_hosts

          # Create timestamped backup before deploying
          ssh -i ~/.ssh/deploy_key "$BLUEHOST_USER@$BLUEHOST_HOST" \
            "cd $(dirname $BLUEHOST_PATH) && \
             tar -czf backup-$(date +%Y%m%d-%H%M%S).tar.gz $(basename $BLUEHOST_PATH) 2>/dev/null || true"

          # Deploy
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            build/ \
            "$BLUEHOST_USER@$BLUEHOST_HOST:$BLUEHOST_PATH/"

      - name: Warn if secrets not configured
        if: env.BLUEHOST_HOST == ''
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
        run: |
          echo "::warning::BlueHost deploy secrets not configured. Skipping deploy."
          echo "Add BLUEHOST_HOST, BLUEHOST_USER, BLUEHOST_PATH, and BLUEHOST_SSH_KEY"
          echo "to the repo's Settings → Secrets → Actions to enable deployment."
